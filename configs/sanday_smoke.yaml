project:
  name: sanday
  team: Manifestro
  description: Fast smoke-test config for Colab debugging
  seed: 42
  deterministic: false

data:
  source: kagglehub
  dataset: prateeknarain/common-voice
  language: en
  sample_rate: 16000
  train_manifest: train.tsv
  valid_manifest: dev.tsv
  test_manifest: test.tsv
  fallback_manifest: validated.tsv
  train_ratio: 0.9
  valid_ratio: 0.05
  audio_column: path
  text_column: sentence

features:
  n_mels: 80
  n_fft: 512
  hop_length: 160
  win_length: 400
  f_min: 80
  f_max: 7600

vocab:
  type: character
  blank_id: 0
  alphabet: "abcdefghijklmnopqrstuvwxyz '"

model:
  variant: sliding_ncp
  window_frames: 32
  window_stride: 4
  cnn_dim: 64
  hidden_dim: 64
  cfc_layers: 1
  dropout: 0.0
  ctc_dropout: 0.0
  mode: default
  use_ncp: false
  ncp_ratio: 1
  mixed_memory: false
  target_parameters: 0

training:
  epochs: 1
  batch_size: 2
  learning_rate: 0.0005
  weight_decay: 0.0
  optimizer: adamw
  scheduler: none
  pct_start: 0.1
  grad_clip: 1.0
  num_workers: 0
  mixed_precision: false

augmentation:
  specaugment: false
  time_masks: 0
  time_width: 0
  freq_masks: 0
  freq_width: 0

decoding:
  mode: greedy_ctc
  external_lm: false

evaluation:
  metrics:
    - wer
    - cer

logging:
  checkpoint_dir: checkpoints/smoke
  log_every_steps: 1
