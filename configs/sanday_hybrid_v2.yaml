project:
  name: sanday
  team: Manifestro
  description: Hybrid Liquid/CfC and Transformer acoustic ASR model without external LM
  seed: 42
  deterministic: true

data:
  source: kagglehub
  dataset: prateeknarain/common-voice
  language: en
  sample_rate: 16000
  train_manifest: train.tsv
  valid_manifest: dev.tsv
  test_manifest: test.tsv
  fallback_manifest: validated.tsv
  train_ratio: 0.9
  valid_ratio: 0.05
  audio_column: path
  text_column: sentence

features:
  n_mels: 80
  n_fft: 400
  hop_length: 160
  win_length: 400
  f_min: 0
  f_max: 8000

vocab:
  type: character
  blank_id: 0
  alphabet: "abcdefghijklmnopqrstuvwxyz '"

model:
  variant: hybrid_v2
  conv_channels: 160
  downsample_stride: 2
  cfc_hidden_size: 320
  cfc_layers: 3
  transformer_heads: 4
  transformer_ffn: 768
  transformer_layers: 1
  dropout: 0.1
  target_parameters: 3000000

training:
  epochs: 60
  batch_size: 12
  learning_rate: 0.0008
  weight_decay: 0.00001
  optimizer: adamw
  scheduler: onecycle
  pct_start: 0.1
  grad_clip: 1.0
  num_workers: 2
  mixed_precision: true

augmentation:
  specaugment: true
  time_masks: 2
  time_width: 48
  freq_masks: 2
  freq_width: 14

decoding:
  mode: greedy_ctc
  external_lm: false

evaluation:
  metrics:
    - wer
    - cer

logging:
  checkpoint_dir: checkpoints/hybrid_v2
  log_every_steps: 50
