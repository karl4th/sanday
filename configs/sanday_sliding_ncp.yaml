project:
  name: sanday
  team: Manifestro
  description: Sliding-window CNN and AutoNCP CfC acoustic ASR model without external LM
  seed: 42
  deterministic: true

data:
  source: kagglehub
  dataset: prateeknarain/common-voice
  language: en
  sample_rate: 16000
  train_manifest: train.tsv
  valid_manifest: dev.tsv
  test_manifest: test.tsv
  fallback_manifest: validated.tsv
  train_ratio: 0.9
  valid_ratio: 0.05
  audio_column: path
  text_column: sentence

features:
  n_mels: 80
  n_fft: 512
  hop_length: 160
  win_length: 400
  f_min: 80
  f_max: 7600

vocab:
  type: character
  blank_id: 0
  alphabet: "abcdefghijklmnopqrstuvwxyz '"

model:
  variant: sliding_ncp
  window_frames: 32
  window_stride: 4
  cnn_dim: 256
  hidden_dim: 256
  cfc_layers: 4
  dropout: 0.1
  ctc_dropout: 0.1
  mode: default
  use_ncp: true
  ncp_ratio: 2
  mixed_memory: false
  target_parameters: 2000000

training:
  epochs: 60
  batch_size: 16
  learning_rate: 0.0008
  weight_decay: 0.00001
  optimizer: adamw
  scheduler: onecycle
  pct_start: 0.1
  grad_clip: 1.0
  num_workers: 2
  mixed_precision: true

augmentation:
  specaugment: true
  time_masks: 2
  time_width: 32
  freq_masks: 2
  freq_width: 12

decoding:
  mode: greedy_ctc
  external_lm: false

evaluation:
  metrics:
    - wer
    - cer

logging:
  checkpoint_dir: checkpoints/sliding_ncp
  log_every_steps: 50
