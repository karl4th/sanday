project:
  name: sanday
  team: Manifestro
  description: Prepared English Common Voice WAV dataset, 10k examples, 80/10/10 split
  seed: 42
  deterministic: true

data:
  source: prepared
  root: /content/dataset
  language: en
  sample_rate: 16000
  train_manifest: metadata.csv
  valid_manifest: metadata.csv
  test_manifest: metadata.csv
  max_items: 10000
  max_audio_seconds: 15.0
  train_ratio: 0.8
  valid_ratio: 0.1
  audio_column: file_name
  text_column: text

features:
  n_mels: 80
  n_fft: 512
  hop_length: 160
  win_length: 400
  f_min: 80
  f_max: 7600

vocab:
  type: character
  blank_id: 0
  alphabet: "abcdefghijklmnopqrstuvwxyz '"

model:
  variant: sliding_ncp
  window_frames: 32
  window_stride: 4
  cnn_dim: 256
  hidden_dim: 256
  cfc_layers: 4
  dropout: 0.1
  ctc_dropout: 0.1
  mode: default
  use_ncp: true
  ncp_ratio: 2
  mixed_memory: false
  target_parameters: 2000000

training:
  epochs: 60
  batch_size: 4
  learning_rate: 0.0008
  weight_decay: 0.00001
  optimizer: adamw
  scheduler: onecycle
  pct_start: 0.1
  grad_clip: 1.0
  num_workers: 2
  mixed_precision: false

augmentation:
  specaugment: true
  time_masks: 2
  time_width: 32
  freq_masks: 2
  freq_width: 12

decoding:
  mode: greedy_ctc
  external_lm: false

evaluation:
  metrics:
    - wer
    - cer

logging:
  checkpoint_dir: checkpoints/prepared_10k
  log_every_steps: 50
